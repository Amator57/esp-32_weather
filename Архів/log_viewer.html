 <!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Графіки з архіву</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
    canvas { background: white; margin: 20px 0; }
    .container { max-width: 800px; margin: auto; }
    .stats { font-size: 14px; margin-top: -15px; margin-bottom: 20px; }
    .stats b { display: inline-block; width: 80px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Графіки BME280 за обрану дату</h2>

    <label for="datePicker">Оберіть дату:</label>
    <input type="date" id="datePicker" max="" />

    <canvas id="chartTemp"></canvas>
    <div id="tempStats" class="stats"></div>

    <canvas id="chartPres"></canvas>
    <div id="presStats" class="stats"></div>

    <canvas id="chartHum"></canvas>
    <div id="humStats" class="stats"></div>
  </div>

  <script>
    const tempCtx = document.getElementById('chartTemp').getContext('2d');
    const presCtx = document.getElementById('chartPres').getContext('2d');
    const humCtx  = document.getElementById('chartHum').getContext('2d');

    let tempChart, presChart, humChart;

    // Обмеження дати на сьогодні
    document.getElementById("datePicker").max = new Date().toISOString().split("T")[0];

    document.getElementById("datePicker").addEventListener("change", () => {
      const selected = document.getElementById("datePicker").value;
      if (selected) loadCSV(`/log/${selected}.csv`);
    });

    async function loadCSV(path) {
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error("Не знайдено CSV");

        const text = await res.text();
        const lines = text.trim().split('\n');
        const time = [], temp = [], hum = [], pres = [];

        for (let line of lines) {
          //const parts = line.trim().split(';');
          const parts = line.trim().split(',');
          if (parts.length === 4) {
            time.push(parts[0]);
            temp.push(parseFloat(parts[1]));
            hum.push(parseFloat(parts[2]));
            pres.push(parseFloat(parts[3]));
          }
        }

        drawCharts(time, temp, hum, pres);
      } catch (e) {
        alert("Помилка: " + e.message);
      }
    }

    function getStats(arr) {
      const min = Math.min(...arr);
      const max = Math.max(...arr);
      const avg = arr.reduce((a, b) => a + b, 0) / arr.length;
      return { min, max, avg };
    }

    function drawCharts(time, temp, hum, pres) {
      if (tempChart) tempChart.destroy();
      if (presChart) presChart.destroy();
      if (humChart) humChart.destroy();

      const zoomOptions = {
        pan: { enabled: true, mode: 'x' },
        zoom: {
          wheel: { enabled: true },
          pinch: { enabled: true },
          mode: 'x'
        }
      };

      // Температура
      const tStats = getStats(temp);
      document.getElementById("tempStats").innerHTML =
        `<b>Макс:</b> ${tStats.max.toFixed(1)}°C &nbsp; <b>Мін:</b> ${tStats.min.toFixed(1)}°C &nbsp; <b>Сер:</b> ${tStats.avg.toFixed(1)}°C`;

      tempChart = new Chart(tempCtx, {
        type: 'line',
        data: {
          labels: time,
          datasets: [{
            label: "Температура (°C)",
            data: temp,
            borderColor: "red",
            fill: false
          }]
        },
        options: {
          responsive: true,
          plugins: { zoom: zoomOptions },
          scales: {
            x: { title: { display: true, text: 'Час' } }
          }
        }
      });

      // Тиск
      const pStats = getStats(pres);
      document.getElementById("presStats").innerHTML =
        `<b>Макс:</b> ${pStats.max.toFixed(1)} hPa &nbsp; <b>Мін:</b> ${pStats.min.toFixed(1)} hPa &nbsp; <b>Сер:</b> ${pStats.avg.toFixed(1)} hPa`;

      presChart = new Chart(presCtx, {
        type: 'line',
        data: {
          labels: time,
          datasets: [{
            label: "Тиск (hPa)",
            data: pres,
            borderColor: "blue",
            fill: false
          }]
        },
        options: {
          responsive: true,
          plugins: { zoom: zoomOptions },
          scales: {
            x: { title: { display: true, text: 'Час' } }
          }
        }
      });

      // Вологість
      const hStats = getStats(hum);
      document.getElementById("humStats").innerHTML =
        `<b>Макс:</b> ${hStats.max.toFixed(1)}% &nbsp; <b>Мін:</b> ${hStats.min.toFixed(1)}% &nbsp; <b>Сер:</b> ${hStats.avg.toFixed(1)}%`;

      humChart = new Chart(humCtx, {
        type: 'line',
        data: {
          labels: time,
          datasets: [{
            label: "Вологість (%)",
            data: hum,
            borderColor: "green",
            fill: false
          }]
        },
        options: {
          responsive: true,
          plugins: { zoom: zoomOptions },
          scales: {
            x: { title: { display: true, text: 'Час' } }
          }
        }
      });
    }
  </script>
</body>
</html>
