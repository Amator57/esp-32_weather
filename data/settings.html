<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Налаштування ESP32</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: #333; }
    form { margin-bottom: 20px; }
    p { margin: 8px 0; }
    button { padding: 8px 16px; font-size: 16px; border-radius: 6px; }
  </style>
</head>
<body>
  <h2>Налаштування ESP32</h2>
  <form method="POST" action="/save">
    <p>IP: <strong>%IP_ADDRESS%</strong></p>
    <p>Назва пристрою: <input type="text" name="device_name" value="%DEVICE_NAME%"></p>
    <p>WiFi SSID: <input type="text" name="ssid" value="%WIFI_SSID%"></p>
    <p>Пароль WiFi: 
      <input type="password" name="password" id="wifi_pwd" value="%WIFI_PASSWORD%">
      <label style="font-size: 0.9em; margin-left: 10px;">
        <input type="checkbox" onclick="document.getElementById('wifi_pwd').type = this.checked ? 'text' : 'password'"> Показати пароль
      </label>
    </p>
    <p>UTC Зміщення (наприклад -2): <input type="number" name="timezone_offset" value="%TZ_OFFSET%" min="-12" max="14"></p>
    <p><label><input type="checkbox" name="use_dst" %USE_DST_CHECKED%> Літній час (DST)</label></p>

    <p>Калібрування температури (°C): 
      <input type="number" name="tempOffset" value="%TEMP_OFFSET%" step="0.1" min="-10" max="10">
    </p>

    <p>Калібрування вологості (&#37;): 
      <input type="number" name="humOffset" value="%HUM_OFFSET%" step="0.1" min="-50" max="50">
    </p>
    
    <h3>Модулі:</h3>
    <p><label><input type="checkbox" name="switch1" %SW1_CHECKED%> Годинник</label></p>
    <p><label><input type="checkbox" name="switch2" %SW2_CHECKED%> Барометр</label></p>
    <p><label><input type="checkbox" name="switch3" %SW3_CHECKED%> Заповіт</label></p>
    <p><label><input type="checkbox" name="switch4" %SW4_CHECKED%> Фото</label></p>
    <p><label><input type="checkbox" name="switch5" %SW5_CHECKED%> Слава</label></p>
    <p><label><input type="checkbox" name="switch6" %SW6_CHECKED%> Тризуб</label></p>
    <p><label><input type="checkbox" name="switch7" %SW7_CHECKED%> Москалі їбучі</label></p>

    <p><button type="submit" style="background-color:#28a745; color:white;">💾 Зберегти</button></p>
  </form>

  <form method="POST" action="/restart" onsubmit="return confirm('Справді перезавантажити ESP32?');">
    <button type="submit" style="background-color:#dc3545; color:white; font-size:18px;">
      🔁 Перезавантажити ESP32
    </button>
  </form>

  <p><a href="/">⬅ Назад</a></p>
</body>
</html>
